<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직무 가치관 월드컵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
        }
        .signature-purple { background-color: #8A70C9; }
        .signature-coral { background-color: #FF8C94; }
        .text-purple { color: #8A70C9; }
        .text-coral { color: #FF8C94; }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(138, 112, 201, 0.3);
        }
        
        .progress-bar {
            transition: width 0.5s ease-in-out;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }

        @keyframes zoomIn {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(1.2); }
        }
        .round-transition {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(138, 112, 201, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .round-transition.active {
            display: flex;
            animation: overlayFade 1.5s ease-in-out forwards;
        }
        @keyframes overlayFade {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        .round-text {
            color: white;
            font-size: 5rem;
            font-weight: 800;
            animation: zoomIn 1.5s ease-in-out forwards;
        }
        @media (max-width: 640px) {
            .round-text { font-size: 3rem; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-2 sm:p-4">

    <!-- Round Transition Overlay -->
    <div id="round-overlay" class="round-transition">
        <div id="round-overlay-text" class="round-text">16강</div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center animate-fade-in">
        <div class="mb-6">
            <span class="inline-block p-3 rounded-full bg-purple-100 text-purple mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </span>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">직무 가치관 월드컵</h1>
            <p class="text-gray-600">내가 일하는 이유와 포기할 수 없는 환경,<br>16강 토너먼트를 통해 찾아보세요!</p>
        </div>
        <button onclick="startGame()" class="w-full signature-purple text-white font-bold py-4 rounded-xl hover:opacity-90 transition card-hover">
            월드컵 시작하기
        </button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden max-w-5xl w-full animate-fade-in relative">
        <div class="text-center mb-6 sm:mb-8">
            <h2 id="round-title" class="text-2xl sm:text-3xl font-bold text-purple mb-2">16강</h2>
            <div class="w-full bg-gray-200 rounded-full h-2.5 mb-2 max-w-xs mx-auto">
                <div id="progress" class="signature-coral h-2.5 rounded-full progress-bar" style="width: 0%"></div>
            </div>
            <p id="match-info" class="text-gray-500 font-medium text-sm sm:text-base">1 / 8 경기</p>
        </div>

        <div class="grid grid-cols-2 gap-2 sm:gap-6 items-stretch relative">
            <!-- Choice 1 -->
            <div onclick="selectChoice(0)" class="bg-white border-2 border-transparent hover:border-purple-300 rounded-xl sm:rounded-2xl p-4 sm:p-8 cursor-pointer transition-all card-hover flex flex-col items-center justify-center text-center min-h-[250px] sm:min-h-[350px]">
                <div class="w-10 h-10 sm:w-16 sm:h-16 rounded-full bg-purple-50 flex items-center justify-center mb-3 sm:mb-6">
                    <span id="choice-0-icon" class="text-xl sm:text-3xl">💡</span>
                </div>
                <h3 id="choice-0-title" class="text-lg sm:text-2xl font-bold text-gray-800 mb-2 sm:mb-3 leading-tight">높은 연봉</h3>
                <p id="choice-0-desc" class="text-gray-500 text-xs sm:text-lg line-clamp-3">내가 일한 만큼 확실하게 돌아오는 금전적 보상</p>
            </div>

            <!-- VS Badge -->
            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 sm:w-12 sm:h-12 bg-white border-2 sm:border-4 border-gray-100 rounded-full flex items-center justify-center z-10 shadow-md">
                <span class="font-bold text-[10px] sm:text-base text-gray-400">VS</span>
            </div>

            <!-- Choice 2 -->
            <div onclick="selectChoice(1)" class="bg-white border-2 border-transparent hover:border-coral-300 rounded-xl sm:rounded-2xl p-4 sm:p-8 cursor-pointer transition-all card-hover flex flex-col items-center justify-center text-center min-h-[250px] sm:min-h-[350px]">
                <div class="w-10 h-10 sm:w-16 sm:h-16 rounded-full bg-coral-50 flex items-center justify-center mb-3 sm:mb-6">
                    <span id="choice-1-icon" class="text-xl sm:text-3xl">🌿</span>
                </div>
                <h3 id="choice-1-title" class="text-lg sm:text-2xl font-bold text-gray-800 mb-2 sm:mb-3 leading-tight">저녁이 있는 삶</h3>
                <p id="choice-1-desc" class="text-gray-500 text-xs sm:text-lg line-clamp-3">정시 퇴근이 보장되어 충분한 휴식과 수면을 취할 수 있는 환경</p>
            </div>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-6 sm:p-10 animate-fade-in">
        <div class="text-center mb-8 sm:mb-10">
            <h2 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">나의 직무 가치관 TOP 3</h2>
            <p class="text-gray-500 text-sm sm:text-base">당신이 일터에서 가장 중요하게 생각하는 가치입니다.</p>
        </div>

        <div class="space-y-4 sm:space-y-6">
            <!-- Rank 1 -->
            <div class="relative bg-gradient-to-r from-purple-50 to-white p-5 sm:p-6 rounded-2xl border-2 border-purple-200 flex items-center shadow-sm">
                <div class="absolute -left-3 sm:-left-4 top-1/2 -translate-y-1/2 w-10 h-10 sm:w-12 sm:h-12 signature-purple text-white flex items-center justify-center rounded-full font-bold text-lg sm:text-xl shadow-lg border-2 sm:border-4 border-white">1</div>
                <div class="ml-8 sm:ml-10">
                    <h4 id="rank-1-title" class="text-lg sm:text-2xl font-bold text-purple"></h4>
                    <p id="rank-1-desc" class="text-gray-600 italic mt-1 text-xs sm:text-sm"></p>
                </div>
            </div>
            <!-- Rank 2 -->
            <div class="relative bg-white p-5 sm:p-6 rounded-2xl border-2 border-gray-100 flex items-center shadow-sm">
                <div class="absolute -left-3 sm:-left-4 top-1/2 -translate-y-1/2 w-8 h-8 sm:w-10 sm:h-10 bg-gray-400 text-white flex items-center justify-center rounded-full font-bold text-base sm:text-lg shadow-md border-2 sm:border-4 border-white">2</div>
                <div class="ml-8 sm:ml-10">
                    <h4 id="rank-2-title" class="text-base sm:text-xl font-bold text-gray-800"></h4>
                    <p id="rank-2-desc" class="text-gray-600 mt-1 text-xs sm:text-sm"></p>
                </div>
            </div>
            <!-- Rank 3 -->
            <div class="relative bg-white p-5 sm:p-6 rounded-2xl border-2 border-gray-100 flex items-center shadow-sm">
                <div class="absolute -left-3 sm:-left-4 top-1/2 -translate-y-1/2 w-8 h-8 sm:w-10 sm:h-10 bg-orange-300 text-white flex items-center justify-center rounded-full font-bold text-base sm:text-lg shadow-md border-2 sm:border-4 border-white">3</div>
                <div class="ml-8 sm:ml-10">
                    <h4 id="rank-3-title" class="text-base sm:text-xl font-bold text-gray-800"></h4>
                    <p id="rank-3-desc" class="text-gray-600 mt-1 text-xs sm:text-sm"></p>
                </div>
            </div>
        </div>

        <button onclick="location.reload()" class="mt-8 sm:mt-12 w-full py-4 text-gray-400 font-medium hover:text-purple transition text-sm sm:text-base">
            다시 테스트하기
        </button>
    </div>

    <script>
        // --- Sound Effects System ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'click') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'round') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            }
        }

        const initialItems = [
            { title: "높은 연봉", desc: "내가 일한 만큼 확실하게 돌아오는 금전적 보상", icon: "💰" },
            { title: "고용 안정성", desc: "경영 위기 걱정 없이 오래 다닐 수 있는 안정감", icon: "🛡️" },
            { title: "저녁이 있는 삶", desc: "정시 퇴근이 보장되어 충분한 휴식과 수면을 취하는 환경", icon: "🌙" },
            { title: "건강 친화적 환경", desc: "사내 휴게실, 유연한 연차 등 건강을 배려받는 환경", icon: "🏥" },
            { title: "유연한 근무 형태", desc: "재택근무나 시차출퇴근제 등 컨디션에 맞춘 시스템", icon: "💻" },
            { title: "낮은 업무 강도", desc: "심리적 안정을 유지하며 일할 수 있는 수준", icon: "🍃" },
            { title: "성취감과 보람", desc: "결과가 눈에 보이고 스스로 뿌듯함을 느끼는 가치", icon: "🏆" },
            { title: "전문성 향상", desc: "전문가로 성장할 수 있는 교육 기회와 커리어 발전", icon: "🚀" },
            { title: "자율적인 업무 방식", desc: "간섭받지 않고 스스로 계획을 세워 주도적으로 하는 일", icon: "🧭" },
            { title: "사회적 기여", desc: "사회의 의미 있는 변화에 도움을 준다는 느낌", icon: "🌍" },
            { title: "수평적이고 자유로운 문화", desc: "직급에 상관없이 자유롭게 의견을 내는 분위기", icon: "💬" },
            { title: "동료와의 좋은 관계", desc: "서로 돕고 응원하며 유대감을 쌓는 동료들", icon: "🤝" },
            { title: "상호 존중과 소통", desc: "명확한 피드백이 오가고 감정 소모가 적은 소통", icon: "👂" },
            { title: "집과의 거리", desc: "출퇴근 피로도가 낮고 개인 시간이 확보되는 조건", icon: "🏠" },
            { title: "다양한 복리후생", desc: "카페테리아, 의료비 지원 등 소소하지만 확실한 혜택", icon: "🎁" },
            { title: "기업 인지도", desc: "사회적 인정과 자부심을 느낄 수 있는 회사", icon: "🏢" }
        ];

        let currentRoundItems = [];
        let nextRoundItems = [];
        let losersOfSemiFinal = [];
        let currentMatchIndex = 0;
        let finalRankings = [];
        let isThirdPlaceMatch = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            currentRoundItems = shuffle([...initialItems]);
            showRoundOverlay("16강");
            updateMatchDisplay();
        }

        function showRoundOverlay(text) {
            const overlay = document.getElementById('round-overlay');
            const overlayText = document.getElementById('round-overlay-text');
            overlayText.innerText = text;
            overlay.classList.remove('active');
            void overlay.offsetWidth;
            overlay.classList.add('active');
            playSound('round');
            setTimeout(() => { overlay.classList.remove('active'); }, 1500);
        }

        function updateMatchDisplay() {
            let item1, item2;
            
            if (isThirdPlaceMatch) {
                document.getElementById('round-title').innerText = "3위 결정전";
                document.getElementById('match-info').innerText = "최종 3위를 가리는 대결";
                document.getElementById('progress').style.width = "95%";
                item1 = losersOfSemiFinal[0];
                item2 = losersOfSemiFinal[1];
            } else {
                const roundName = getRoundName(currentRoundItems.length);
                document.getElementById('round-title').innerText = roundName;
                const totalMatchesInRound = currentRoundItems.length / 2;
                document.getElementById('match-info').innerText = `${currentMatchIndex + 1} / ${totalMatchesInRound} 경기`;
                const progress = (currentMatchIndex / totalMatchesInRound) * 100;
                document.getElementById('progress').style.width = `${progress}%`;
                item1 = currentRoundItems[currentMatchIndex * 2];
                item2 = currentRoundItems[currentMatchIndex * 2 + 1];
            }

            document.getElementById('choice-0-title').innerText = item1.title;
            document.getElementById('choice-0-desc').innerText = item1.desc;
            document.getElementById('choice-0-icon').innerText = item1.icon;

            document.getElementById('choice-1-title').innerText = item2.title;
            document.getElementById('choice-1-desc').innerText = item2.desc;
            document.getElementById('choice-1-icon').innerText = item2.icon;
        }

        function getRoundName(count) {
            if (count === 16) return "16강";
            if (count === 8) return "8강";
            if (count === 4) return "4강";
            if (count === 2) return "결승전";
            return "월드컵";
        }

        function selectChoice(index) {
            playSound('click');

            if (isThirdPlaceMatch) {
                // 3위 결정전 선택 완료
                finalRankings[2] = losersOfSemiFinal[index];
                setTimeout(() => showResults(), 400);
                return;
            }

            const winner = currentRoundItems[currentMatchIndex * 2 + index];
            const loser = currentRoundItems[currentMatchIndex * 2 + (index === 0 ? 1 : 0)];

            nextRoundItems.push(winner);
            
            // 4강 탈락자 수집 (3위 결정전용)
            if (currentRoundItems.length === 4) {
                losersOfSemiFinal.push(loser);
            }
            
            // 결승전 결과 저장
            if (currentRoundItems.length === 2) {
                finalRankings[0] = winner;
                finalRankings[1] = loser;
            }

            currentMatchIndex++;

            if (currentMatchIndex * 2 >= currentRoundItems.length) {
                // 라운드 종료
                if (currentRoundItems.length === 2) {
                    // 결승전이 끝났으면 3위 결정전으로 이동
                    setTimeout(() => {
                        isThirdPlaceMatch = true;
                        showRoundOverlay("3위 결정전");
                        updateMatchDisplay();
                    }, 500);
                } else {
                    // 다음 토너먼트 라운드 진행
                    setTimeout(() => {
                        currentRoundItems = [...nextRoundItems];
                        nextRoundItems = [];
                        currentMatchIndex = 0;
                        const nextName = getRoundName(currentRoundItems.length);
                        showRoundOverlay(nextName);
                        updateMatchDisplay();
                    }, 500);
                }
            } else {
                updateMatchDisplay();
            }
        }

        function showResults() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            document.getElementById('rank-1-title').innerText = finalRankings[0].title;
            document.getElementById('rank-1-desc').innerText = `"${finalRankings[0].desc}"`;
            
            document.getElementById('rank-2-title').innerText = finalRankings[1].title;
            document.getElementById('rank-2-desc').innerText = finalRankings[1].desc;
            
            document.getElementById('rank-3-title').innerText = finalRankings[2].title;
            document.getElementById('rank-3-desc').innerText = finalRankings[2].desc;
        }
    </script>
</body>
</html>
